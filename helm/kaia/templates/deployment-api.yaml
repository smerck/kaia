apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaia-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: kaia-api
  template:
    metadata:
      labels:
        app: kaia-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: 8080
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kaia-anthropic-api-key
                  key: ANTHROPIC_API_KEY
