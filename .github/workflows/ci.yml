name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  test-go:
    name: Test Go API
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run linter
      run: |
        go install golang.org/x/lint/golint@latest
        golint -set_exit_status ./...

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: go
        name: go-coverage

  test-web:
    name: Test Web Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm ci

    - name: Run linter
      run: |
        cd web
        npm run lint

    - name: Run tests
      run: |
        cd web
        npm test -- --coverage --watchAll=false

    - name: Build for production
      run: |
        cd web
        npm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-go, test-web]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API image
      run: |
        docker build -f Dockerfile.api -t kaia-api:test .

    - name: Build Web image
      run: |
        cd web
        docker build -t kaia-web:test .

    - name: Test Docker images
      run: |
        # Test API image
        docker run --rm kaia-api:test --help || true
        
        # Test Web image
        docker run --rm kaia-web:test nginx -t

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-go, test-web]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install web dependencies
      run: |
        cd web
        npm ci

    - name: Build web
      run: |
        cd web
        npm run build

    - name: Start API server
      run: |
        go run ./cmd/kaia-api &
        sleep 5

    - name: Test API endpoint
      run: |
        curl -X POST http://localhost:8080/api/v1/ask \
          -H "Content-Type: application/json" \
          -d '{"prompt":"test","backend":"openai"}' \
          -f || echo "API test failed (expected without API keys)"

    - name: Cleanup
      run: pkill -f "go run" || true 